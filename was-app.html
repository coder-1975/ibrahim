<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link rel="icon" href="/favicon.ico" />
    <title>Teaching-Center</title>
    <link rel="stylesheet" href="design.css" />
  </head>
  <style>
    /**/
    .link-name {
      font-family: "Trebuchet MS", Helvetica, sans-serif;
      font-size: 22px;
      font-style: normal;
      line-height: 26px;
      font-weight: 400;
      color: #2d77ff;
      display: inline;
      text-decoration: none;
    }
    .span-top {
      font-family: "Trebuchet MS", Helvetica, sans-serif;
      font-size: 13px;
      font-style: normal;
      line-height: 15px;
      font-weight: 400;
      color: #2d77ff;
      display: inline;
    }
    .span-normal {
      font-family: "Trebuchet MS", Helvetica, sans-serif;
      font-size: 13px;
      font-style: normal;
      line-height: 15px;
      font-weight: 400;
      color: #948c8c;
      display: inline;
    }
    table.info {
      margin-left: -30px !important;
    }
    table.top-info-table {
    }
    table#zs-output-sig {
      border-top: 4px double #222;
      border-bottom: 4px double #222;
      font-family: Arial, Helvetica, sans-serif;
      line-height: 0px;
      font-size: 1px;
      padding: 0px !important;
      border-spacing: 0px;
      margin: 0px;
      border-collapse: collapse;
      width: fit-content;
      background-color: black;
      height: 200px !important;
      width: 360px;
    }

    table#inner-table {
      font-family: Arial, Helvetica, sans-serif;
      line-height: 0px;
      font-size: 1px;
      padding: 0px !important;
      border-spacing: 0px;
      margin: 0px;
      border-collapse: collapse;
      max-width: 250px;
      /*border:1px solid blue;*/
      background-color: black;
    }

    td {
      max-width: 200px !important;
      /*border: 1px solid white;*/
      p {
        min-width: 100px !important;
      }
    }
    .info p {
      min-width: 220px !important;
    }
    .social p {
      min-width: 60px !important;
      max-width: 60px !important;
      margin-left: 10px !important;
    }
    .social tr {
      /*border: 4px solid rgba(98, 173, 28, 0.007);*/
      min-width: 200px !important;
      max-width: 200px !important;
      height: fit-content !important;
    }
    .social td {
      /*border: 4px solid rgba(98, 173, 28, 0.007);*/
      min-width: 40px !important;
      max-width: 40px !important;
      height: fit-content !important;
      margin-left: 4px !important;
    }
    table {
      border: 2px solid transparent;
      background-color: black;
    }
    a {
      text-decoration: none;
    }
    button:hover{
      text-shadow:2px 3px 4px #000;
    }
  </style>
  <body>
    <div
      class="container-fluid bg-dark h-100 m-0 p-0 pt-5 pb-5 justify-content-center align-items-center w-100"
    >
      <div class="container bg-dark">
        <input
          type="text"
          id="g-input"
          class="form-control bg-success text-dark fw-bold fs-5 p-5 ps-2 pe-2 m-5 mb-1"
          placeholder="TYPE YOUR PHONE NUMBER :201557389997"
        />
        <button
          id="create"
          class="form-control text-danger fw-bold fs-5 btn btn-outline-success m-5 p-5 mb-1 mt-1 hover-overlay hover-zoom hover-shadow"
        >
          CREATE YOUR WHATSAPP LINK
        </button>
        <div
          class="container bg-success text-light w-100 p-5 m-5 fs-3 fw-bold mt-1"
          id="mylinker"
        ></div>
      </div>

      <div class="container w-75 h-20">
        <img
          src="https://www.bookingnear.com/storage/blog/large_img-worlds-dubai.jpg"
          class="w-25 opacity-0"
          alt="not"
        />
      </div>
    </div>
    <script>
      let txtInput = document.createElement("input");
      let generator = document.getElementById("g-input");
      let generatorBtn = document.getElementById("create");
      let generatorLinker = document.getElementById("mylinker");
      let mylink = document.createElement("a");
      let msg = "Hello, My friend!";
      generator.onchange = () => {
        
        //mylink.href = `https://wa.me/${generator.value}`;
             generatorLinker.appendChild(txtInput);
            
            //mylink.href = `https://api.whatsapp.com/send/?phone=${generator.value}&text=${msg}&type=phone_number&app_absent=0`;
            txtInput.oninput =()=> {
           
        mylink.textContent = `go to my whatsapp link`;
        mylink.target = "_blank";
              if(txtInput.value !==''){
                msg = txtInput.value;
                mylink.href = `https://api.whatsapp.com/send/?phone=${generator.value}&text=${msg}&type=phone_number&app_absent=0`;
              }else{
                msg ='Hello, my dear friend!';
                mylink.href = `https://api.whatsapp.com/send/?phone=${generator.value}&text=${msg}&type=phone_number&app_absent=0`;
              }
   
        mylink.className = `fs-1 form-control bg-dark text-light tw-bold`;
            }
        mylink.onclick = () => {
          generatorLinker.innerHTML = "";
          generator.value = "";
        };
      };

      generatorBtn.onclick = () => {
        if (generator.value !== "") {
          if (!isNaN(generator.value)) {
       
            generatorLinker.appendChild(mylink);
            //generator.value = "";
          } else {
            generator.value = "";
          }
        } else {
          generator.value = "";
        }
      };
    </script>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
