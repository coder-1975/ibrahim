<!DOCTYPE html>
<html>
<head>
    <title>YOUGLISH </title>
    <style>
        
      @media (min-width: 320px) {
        /* smartphones, iPhone, portrait 480x320 phones */
        * {
          overflow: hidden;
          outline: none;
          border: none;
        }
        body {
          background-color: rgba(38, 65, 83, 0.699);
          color: aliceblue;
          padding: 7%;
        }
        h2,
        span {
          width: 100%;
          font-size: 3rem;
          color: rgb(221, 219, 210);
        }
        input {
          width: 77%;
          height: 8%;
          font-size: 3.5rem;
          padding: 8px;
          background-color: rgba(38, 65, 83, 0.699);
        }
        button {
          width: 18%;
          height: 8%;
          font-size: 3.5rem;
          color: rgb(163, 211, 223);
          background-color: rgb(23, 42, 61);
          border: 2px solid rgb(185, 211, 250);
          box-shadow: 2px 6px 5px 3px #234;
          padding: 19px;
        }
        input {
          box-shadow: -2px 1px 3px 1px #234;
          border: 2px solid #012;
          
          color: white;
          padding: 5px 1px;
        }
        button {
          color: #456;
          background-color: #012;
          border: 2px solid #011;
          padding: 5px 1px;
          box-shadow: 2px 6px 5px 3px #234;
        }
        button:hover {
          background-color: #001;
          box-shadow: 1px 1px 1px 1px #234;
          cursor: pointer;
        }
      }
      @media (min-width: 481px) {
        /* portrait e-readers (Nook/Kindle), smaller tablets @ 600 or @ 640 wide. */
      }
      @media (min-width: 641px) {
        /* portrait tablets, portrait iPad, landscape e-readers, landscape 800x480 or 854x480 phones */
      }
      @media (min-width: 961px) {
        /* tablet, landscape iPad, lo-res laptops ands desktops */
      }
      @media (min-width: 1025px) {
        /* big landscape tablets, laptops, and desktops */
      }
      @media (min-width: 1281px) {
        /* hi-res laptops and desktops */
      }
    </style>
</head>
<body>
    <h2>WORD: <span id="my-id">...</span></h2>
    <div>
    <input type="text" id="word-id" placeholder="Enter Word!">
    <button onclick="wordCall()">FIND</button><br><br>
   </div>

        let wordInput = document.getElementById("word-id");
        let link="https://youglish.com/pronounce/co_dependant/english/us";
        let start ="https://youglish.com/";
        let end ="/english/us";
        let word="";
         wordInput.onchange=()=>{
                    word = wordInput.value;
              }
         if(word ===""){
              wordInput.onchange=()=>{
                    word = wordInput.value;
              }
        }else{}
        if(word !==""){
             link=`https://youglish.com/pronounce/${word}/english/us`;
        }else{}

        function wordCall(){
             
              if(word !==""){
                    window.open(`https://youglish.com/pronounce/${word}/english/us`,"_blank");
             }else{}
        }
    </script>
</body>
</html>
