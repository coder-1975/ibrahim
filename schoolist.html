  <script>
    let msg = "";
    let tasksCount = 0;
    let allSchools = document.getElementById("allSchools");

    const schools =
      [
        "الملقة ع",
        "زهرة ع",
        "شركة عواد ع",
        "مرجان ع",
        "محمد سعد عبد الواحد ع",
        "ق لوقين ع",
        "عبدالقادر خليف ع",
        "ق ابوقير ع",
        "م ق ابوقير ع",
        "الروضة ع",
        "الشعيرة ع",
        "زكي الابراشي ع",
        "جاب الله ع",
        "حوض 7 ع",
        "الطرح ع",
        "الربعمائة ع",
        "ابوزيد خليفة ع",
        "الطاهر الصافي ع",
        "معتوق ع",
        "البسلقون ع"
      ];

    const schoolsWNumbers =
      [
        "201007551873",
        "201011565154",
        "201200113591",
        "201004220069",
        "201222560932",
        "201284422080",
        "201097369837",
        "201097118912",
        "201278085360",
        "201000809209",
        "201220989250",
        "201020627475",
        "201284442840",
        "201280710193",
        "201110437688",
        "201275472899",
        "201211951567",
        "201151995586",
        "201148270310",
        "201117361162"
      ];

    const schoolsWMembers =
      [
        "Minah Gamal",
        "Walaa Maghrabi",
        "Heba Abdlreheem",
        "Ahmed Morgan",
        "Ghada Altemsaah",
        "Eman Hasan",
        "Asmaa Abdlqader",
        "Shimaa Alhosiny",
        "Maha Saber",
        "Nagwa Aboelnagah",
        "Tareq Alshaierah",
        "Muhammad Alramy",
        "Asmaa Shabaan",
        "Hemadah Hood",
        "Muhammad Tarah",
        "Shimaa Alrobamiah",
        "Said Abozeed",
        "Shaker Safey",
        "Maher Matooq",
        "Hamaad Baslquoon"
      ];


    allSchools.innerText = schools.length - tasksCount;
    let sends = document.getElementById("sends");
    const relatedToInputs = document.querySelectorAll('.relatedToInputs');
    const schoolContainers = document.querySelectorAll('input[type="text"]');
    let schoolCheckers = document.querySelectorAll('input[type="checkbox"]');
    let startall = document.getElementById("startall");
    let endall = document.getElementById("endall");
    let counter = document.getElementById("counter");
    let checks = 0;

    schoolsWNumbers.forEach((n, i) => {
      let numbersContainer = document.createElement("span");
      numbersContainer.className="spaniola";
      schoolContainers[i].value = schools[i];
      schoolContainers[i].parentNode.appendChild(numbersContainer);
      numbersContainer.innerText =i+1;
      let senders = document.createElement("div");
      senders.className = "senders";
      sends.appendChild(senders);
      let sendersInputs = document.createElement("input");
      let sendersBtns = document.createElement("button");
      let sendersSpans = document.createElement("span");
      sendersBtns.innerText = "send";
      sendersInputs.value = n;
      sendersSpans.className = "relatedToInputs";
      sendersSpans.innerText = i + 1;
      sendersBtns.className = "bg-danger border border-light border-2 fw-bold text-light p-2 numberBtns";
      sendersInputs.className = "numberInputs";
      sendersInputs.placeholder = "TYPE NUMBER...";
      senders.appendChild(sendersSpans);
      senders.appendChild(sendersInputs);
      senders.appendChild(sendersBtns);
      sendersBtns.onclick = () => {
        //alert(sendersInputs.value);
        let check1Txt = document.getElementById("morning");
        let check2Txt = document.getElementById("evening");
        let check1 = document.getElementById("formorning");
        let check2 = document.getElementById("forevening");
        if (check1.checked) {
          msg = check1Txt.value;
        } else if (check2.checked) {
          msg = check2Txt.value;
        } else {
          msg = "السلام عليكم";
        }
        
          
        schoolCheckers[i].checked = true;
        if ( schoolCheckers[i].checked) {
        // Action if checked
        schoolContainers[i].style.color = "green";
        checks++;
        tasksCount = checks;
        counter.textContent = tasksCount;
        ///////////////////
        allSchools.innerText = schools.length - tasksCount;
      }
      


        
        let sendersLinks = document.createElement("a");
        sendersLinks.innerText = `${schoolsWMembers[i]}|WHATS`;
        sendersLinks.target = "_blank";
        sendersLinks.href = `https://api.whatsapp.com/send/?phone=${sendersInputs.value}&text=${msg}&type=phone_number&app_absent=0`;
        senders.appendChild(sendersLinks);
       
        sendersBtns.remove();
        sendersInputs.remove();
        sendersSpans.remove();
        schoolCheckers[i].parentNode.remove();
        sendersLinks.onclick =()=>{
          sendersLinks.remove();
        }
      }
    });

    schoolContainers.forEach((item, index) => {
      if (item.value == "undefined") {
        item.parentNode.remove();
      } else {
        item.style.color = "lightgrey";
        item.style.fontSize = "25px";
        item.style.fontWeight = "bold";
        item.style.display = "block";
      }
    });

   
    schoolCheckers.forEach((item, index) => {
      if (item.checked) {
        // Action if checked
        schoolContainers[index].style.color = "green";
        checks++;
      }
      tasksCount = checks;
      counter.textContent = tasksCount;
    });




    schoolCheckers.forEach((item, index) => {
      item.addEventListener("click", () => {
        if (item.checked) {
          // Action if checked
          schoolContainers[index].style.color = "green";
          tasksCount += 1;
          counter.textContent = tasksCount;
          item.parentNode.remove();
          allSchools.innerText = schools.length - tasksCount;
          ///////////////////////////////////////
          if (schools.length - tasksCount === 0) {
            startall.innerText = "انهيت ابلاغ";
            allSchools.style.color = "white";
            endall.innerText = "المدارس";
            allSchools.innerText = schools.length - tasksCount;
          } else {
            startall.innerText = "يجب ابلاغ";
            allSchools.style.color = "red";
            endall.innerText = "مدرسة";
            allSchools.innerText = schools.length - tasksCount;
          }
          ///////////////////////////////////////////
        } else {
          // Action if not checked
          schoolContainers[index].style.color = "red";
          tasksCount -= 1;
          counter.textContent = tasksCount;
          allSchools.innerText = schools.length - tasksCount;

          ///////////////////////////////////////
          if (schools.length - tasksCount === 0) {
            startall.innerText = "انهيت ابلاغ";
            allSchools.style.color = "white";
            endall.innerText = "المدارس";
            allSchools.innerText = schools.length - tasksCount;
          } else {
            startall.innerText = "يجب ابلاغ";
            allSchools.style.color = "red";
            endall.innerText = "مدرسة";
            allSchools.innerText = schools.length - tasksCount;
          }
          ///////////////////////////////////////////
        }
      });
    });
