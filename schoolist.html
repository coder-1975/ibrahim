<script>
let tasksCount=0;
let allSchools=document.getElementById("allSchools");

let schools=
[
"الملقة ع",
"زهرة ع",
"شركة عواد ع",
"مرجان ع",
"محمد سعد عبد الواحد ع",
"ق لوقين ع",
"عبدالقادر خليف ع",
"ق ابوقير ع",
"م ق ابوقير ع",
"الروضة ع",
"الشعيرة ع",
"زكي الابراشي ع",
"جاب الله ع",
"حوض 7 ع",
"الطرح ع",
"الربعمائة ع",
"ابوزيد خليفة ع",
"الطاهر الصافي ع",
"معتوق ع",
"البسلقون ع"
];


allSchools.innerText=schools.length-tasksCount;


let schoolContainers=document.querySelectorAll('input[type="text"]');
let schoolCheckers=document.querySelectorAll('input[type="checkbox"]');

schoolContainers.forEach((item,index)=>{
           item.value=`${schools[index]}`; 
           let s = document.createElement("span");
           s.className="spaniola";
           s.innerText=`${index+1}`; 
           item.parentElement.appendChild(s);               
});

schoolContainers.forEach((item,index)=>{

           if(item.value=="undefined"){
           item.parentNode.remove();
        
          }else{
              item.style.color="lightgrey";
              item.style.fontSize="25px";
              item.style.fontWeight="bold";
              item.style.display="block";
          }  
});

let counter = document.getElementById("counter");
           let checks = 0;
schoolCheckers.forEach((item,index)=>{

           if (item.checked) {
         // Action if checked
        schoolContainers[index].style.color="green";
        checks++;
      
        } 
tasksCount=checks;
  counter.textContent =tasksCount;
            
});




schoolCheckers.forEach((item,index)=>{
         item.addEventListener("click",()=>{
           if (item.checked) {
         // Action if checked
        schoolContainers[index].style.color="green";
        tasksCount+=1;
        counter.textContent =tasksCount;
        item.parentNode.remove();
allSchools.innerText=schools.length-tasksCount;
///////////////////////////////////////
if(schools.length-tasksCount===0){
startall.innerText="انهيت ابلاغ";
allSchools.style.color="white";
endall.innerText="المدارس";
allSchools.innerText=schools.length-tasksCount;
}else{
startall.innerText="يجب ابلاغ";
allSchools.style.color="red";
endall.innerText="مدرسة";
allSchools.innerText=schools.length-tasksCount;
}
///////////////////////////////////////////
        } else {
       // Action if not checked
 schoolContainers[index].style.color="red";
tasksCount-=1;
